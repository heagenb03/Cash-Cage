<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .bubble-wrap { position: absolute; left: 0; right: 0; top: 27%; display: flex; justify-content: center; }
  .bubble {
    max-width: 78%; padding: 64px 72px; border-radius: 64px; border-bottom-left-radius: 20px;
    background: #232326; color: #f2f2f4;
    font-size: 44px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
    box-shadow: 0 50px 110px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.05);
    transform: rotateZ(-2deg);
  }
  .bubble .handle { color: #B072BB; font-weight: 700; }
  body.ipad .bubble { font-size: 40px; max-width: 62%; }
</style>
</head>
<body>
<script>const SLIDE = /*__SLIDE_JSON__*/null;</script>
<div class="suits"></div>
<header class="caption">
  <p class="kicker"></p>
  <h1 class="headline"></h1>
</header>
<div class="bubble-wrap"><div class="bubble"></div></div>
<script>
  document.body.classList.add(SLIDE.device);
  document.querySelector('.kicker').textContent = SLIDE.kicker;
  const h = document.querySelector('.headline');
  h.innerHTML = SLIDE.headline
    .map((line, i) => {
      const cls = i === SLIDE.headline.length - 1 ? ' class="grad"' : '';
      const esc = line.replace(/&/g, '&amp;').replace(/</g, '&lt;');
      return `<span${cls}>${esc}</span>`;
    })
    .join('<br>');
  // Highlight the payment annotations "(Venmo @maria-ho)" etc. in accent purple.
  const esc = SLIDE.shareText.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  document.querySelector('.bubble').innerHTML =
    esc.replace(/\(([^)]+)\)/g, '(<span class="handle">$1</span>)');
</script>
</body>
</html>
